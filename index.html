<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Local Face Photos</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <header class="topbar">
      <div>
        <p class="eyebrow">Local-first photo search</p>
        <h1>Face Library</h1>
      </div>
      <div class="actions">
        <button id="clearDbBtn" class="ghost">Clear Index</button>
      </div>
    </header>

    <main>
      <section class="control-band">
      <div class="folder-state">
          <span id="supportBadge" class="badge">Checking local engine</span>
          <span id="folderLabel">No folder selected</span>
        </div>
        <div class="path-row">
          <label for="pathInput">Folder</label>
          <input id="pathInput" type="text" placeholder="/Users/you/Pictures/Google Photos">
          <label class="scan-label" for="scanMode">
            Scan
            <select id="scanMode">
              <option value="photos">Photos</option>
              <option value="videos">Videos</option>
              <option value="both">Both</option>
            </select>
          </label>
          <button id="scanPathBtn" class="primary">Scan Path</button>
        </div>
        <div class="search-row">
          <label for="searchInput">Search people</label>
          <input id="searchInput" type="search" placeholder="Aman, Mom">
          <button id="searchBtn">Search</button>
          <button id="showAllBtn" class="ghost">Show All</button>
        </div>
      </section>

      <section class="stats-grid" aria-label="Index statistics">
        <article>
          <span id="fileCount">0</span>
          <p>files scanned</p>
        </article>
        <article>
          <span id="faceCount">0</span>
          <p>faces found</p>
        </article>
        <article>
          <span id="tagCount">0</span>
          <p>people tagged</p>
        </article>
        <article>
          <span id="matchCount">0</span>
          <p>current matches</p>
        </article>
      </section>

      <section class="progress-wrap" aria-live="polite">
        <div class="progress-info">
          <span id="progressText">Choose a folder to begin.</span>
          <span class="progress-actions">
            <span id="progressPercent"></span>
            <button id="activityToggle" class="activity-link" type="button" aria-expanded="false" aria-controls="activityPanel">Activity: Idle</button>
          </span>
        </div>
        <progress id="scanProgress" max="100" value="0"></progress>
        <div id="activityPanel" class="activity-popover" hidden>
          <div class="activity-head">
            <strong>Recent activity</strong>
            <button id="activityClose" class="mini ghost" type="button">Close</button>
          </div>
          <ol id="activityList" class="activity-list" aria-live="polite"></ol>
        </div>
      </section>

      <section class="workspace">
        <aside>
          <section class="side-section">
            <div class="panel-title">
              <h2>People</h2>
              <button id="untaggedBtn" class="mini">Untagged</button>
            </div>
            <div id="peopleList" class="people-list"></div>
          </section>
        </aside>

        <section class="gallery-shell">
          <div class="panel-title">
            <h2 id="galleryTitle">Matches</h2>
            <span id="galleryHint">Search uses AND matching for multiple names.</span>
          </div>
          <div class="gallery-toolbar" aria-label="Gallery filters">
            <label>
              Type
              <select id="mediaFilter">
                <option value="both">Photos and videos</option>
                <option value="photos">Photos only</option>
                <option value="videos">Videos only</option>
              </select>
            </label>
            <label class="inline-filter">
              <input id="showNoFaceVideos" type="checkbox">
              Show no-face videos
            </label>
            <label>
              Year
              <select id="yearFilter">
                <option value="">Any</option>
              </select>
            </label>
            <label>
              Month
              <select id="monthFilter">
                <option value="">Any</option>
                <option value="01">Jan</option>
                <option value="02">Feb</option>
                <option value="03">Mar</option>
                <option value="04">Apr</option>
                <option value="05">May</option>
                <option value="06">Jun</option>
                <option value="07">Jul</option>
                <option value="08">Aug</option>
                <option value="09">Sep</option>
                <option value="10">Oct</option>
                <option value="11">Nov</option>
                <option value="12">Dec</option>
              </select>
            </label>
            <label>
              Date
              <input id="dateFilter" type="date">
            </label>
            <label>
              Sort
              <select id="sortDirection">
                <option value="desc">Newest first</option>
                <option value="asc">Oldest first</option>
              </select>
            </label>
          </div>
          <div id="gallery" class="gallery"></div>
        </section>
      </section>
    </main>

    <div id="lightbox" class="lightbox" aria-hidden="true">
      <button id="lightboxClose" class="lightbox-close" type="button" aria-label="Close viewer">×</button>
      <button id="lightboxPrev" class="lightbox-nav lightbox-prev" type="button" aria-label="Previous photo">‹</button>
      <figure class="lightbox-frame">
        <img id="lightboxImage" alt="">
        <video id="lightboxVideo" controls playsinline></video>
        <figcaption>
          <strong id="lightboxName"></strong>
          <span id="lightboxMeta"></span>
        </figcaption>
      </figure>
      <button id="lightboxNext" class="lightbox-nav lightbox-next" type="button" aria-label="Next photo">›</button>
    </div>

    <div id="busyOverlay" class="busy-overlay" aria-hidden="true" role="status">
      <div class="busy-panel">
        <span class="busy-spinner"></span>
        <strong id="busyText">Applying changes...</strong>
      </div>
    </div>

    <template id="photoTemplate">
      <article class="photo-card">
        <div class="media-wrap"></div>
        <div class="photo-meta">
          <strong class="file-name"></strong>
          <span class="file-path"></span>
          <div class="photo-actions">
            <button class="rescan-photo" type="button">Rescan faces</button>
            <button class="reset-ignored" type="button">Reset ignored</button>
          </div>
        </div>
        <div class="bulk-face-actions" hidden>
          <span class="bulk-face-count">0 selected</span>
          <button class="bulk-remove-face" type="button">Remove selected</button>
        </div>
        <div class="faces"></div>
      </article>
    </template>

    <template id="faceTemplate">
      <div class="face-chip">
        <input class="face-select" type="checkbox" aria-label="Select face">
        <canvas width="96" height="96"></canvas>
        <div class="face-fields">
          <input type="text" placeholder="Tag name" list="personSuggestions">
          <span class="face-extra"></span>
        </div>
        <button type="button" class="remove-face-btn" aria-label="Remove face" title="Remove face">−</button>
      </div>
    </template>

    <datalist id="personSuggestions"></datalist>

    <script src="./app.js" type="module"></script>
  </body>
</html>
