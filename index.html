<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Local Face Photos</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <header class="topbar">
      <div>
        <p class="eyebrow">Local-first photo search</p>
        <h1>Face Library</h1>
      </div>
      <div class="actions">
        <button id="clearDbBtn" class="ghost">Clear Index</button>
      </div>
    </header>

    <main>
      <section class="control-band">
      <div class="folder-state">
          <span id="supportBadge" class="badge">Checking local engine</span>
          <span id="folderLabel">No folder selected</span>
        </div>
        <div class="path-row">
          <label for="pathInput">Photo folder</label>
          <input id="pathInput" type="text" placeholder="/Users/you/Pictures/Google Photos">
          <button id="scanPathBtn" class="primary">Scan Path</button>
        </div>
        <div class="search-row">
          <label for="searchInput">Search people</label>
          <input id="searchInput" type="search" placeholder="Aman, Mom">
          <button id="searchBtn">Search</button>
          <button id="showAllBtn" class="ghost">Show All</button>
        </div>
      </section>

      <section class="stats-grid" aria-label="Index statistics">
        <article>
          <span id="fileCount">0</span>
          <p>files scanned</p>
        </article>
        <article>
          <span id="faceCount">0</span>
          <p>faces found</p>
        </article>
        <article>
          <span id="tagCount">0</span>
          <p>people tagged</p>
        </article>
        <article>
          <span id="matchCount">0</span>
          <p>current matches</p>
        </article>
      </section>

      <section class="progress-wrap" aria-live="polite">
        <div class="progress-info">
          <span id="progressText">Choose a folder to begin.</span>
          <span id="progressPercent"></span>
        </div>
        <progress id="scanProgress" max="100" value="0"></progress>
      </section>

      <section class="workspace">
        <aside>
          <div class="panel-title">
            <h2>People</h2>
            <button id="untaggedBtn" class="mini">Untagged</button>
          </div>
          <div id="peopleList" class="people-list"></div>
        </aside>

        <section class="gallery-shell">
          <div class="panel-title">
            <h2 id="galleryTitle">Matches</h2>
            <span id="galleryHint">Search uses AND matching for multiple names.</span>
          </div>
          <div class="gallery-toolbar" aria-label="Gallery filters">
            <label>
              Year
              <select id="yearFilter">
                <option value="">Any</option>
              </select>
            </label>
            <label>
              Month
              <select id="monthFilter">
                <option value="">Any</option>
                <option value="01">Jan</option>
                <option value="02">Feb</option>
                <option value="03">Mar</option>
                <option value="04">Apr</option>
                <option value="05">May</option>
                <option value="06">Jun</option>
                <option value="07">Jul</option>
                <option value="08">Aug</option>
                <option value="09">Sep</option>
                <option value="10">Oct</option>
                <option value="11">Nov</option>
                <option value="12">Dec</option>
              </select>
            </label>
            <label>
              Date
              <input id="dateFilter" type="date">
            </label>
            <label>
              Sort
              <select id="sortDirection">
                <option value="desc">Newest first</option>
                <option value="asc">Oldest first</option>
              </select>
            </label>
          </div>
          <div id="gallery" class="gallery"></div>
        </section>
      </section>
    </main>

    <div id="lightbox" class="lightbox" hidden>
      <button id="lightboxClose" class="lightbox-close" type="button" aria-label="Close viewer">×</button>
      <button id="lightboxPrev" class="lightbox-nav lightbox-prev" type="button" aria-label="Previous photo">‹</button>
      <figure class="lightbox-frame">
        <img id="lightboxImage" alt="">
        <figcaption>
          <strong id="lightboxName"></strong>
          <span id="lightboxMeta"></span>
        </figcaption>
      </figure>
      <button id="lightboxNext" class="lightbox-nav lightbox-next" type="button" aria-label="Next photo">›</button>
    </div>

    <template id="photoTemplate">
      <article class="photo-card">
        <div class="media-wrap"></div>
        <div class="photo-meta">
          <strong class="file-name"></strong>
          <span class="file-path"></span>
          <div class="photo-actions">
            <button class="rescan-photo" type="button">Rescan faces</button>
            <button class="reset-ignored" type="button">Reset ignored</button>
          </div>
        </div>
        <div class="faces"></div>
      </article>
    </template>

    <template id="faceTemplate">
      <div class="face-chip">
        <canvas width="96" height="96"></canvas>
        <input type="text" placeholder="Tag name">
        <button class="remove-face" type="button" aria-label="Ignore this face" title="Ignore this face">−</button>
      </div>
    </template>

    <script src="./app.js" type="module"></script>
  </body>
</html>
