name: Build Windows Installer

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-windows:
    name: Build Windows x64 Installer
    runs-on: windows-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-desktop.txt

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -r requirements.txt
          python -m pip install -r requirements-desktop.txt

      - name: Install frontend dependencies
        run: npm ci

      - name: Run checks
        run: python scripts/check.py

      - name: Build Windows installer
        env:
          TAURI_BUNDLES: nsis
          NO_ALBUMENTATIONS_UPDATE: "1"
        run: python scripts/desktop_build.py

      - name: Verify packaged backend health
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $env:LOCAL_FACE_PACKAGED = "1"
          $env:LOCAL_FACE_HOST = "127.0.0.1"
          $env:LOCAL_FACE_PORT = "8128"
          $backend = ".\src-tauri\binaries\local-face-backend-x86_64-pc-windows-msvc.exe"
          $process = Start-Process -FilePath $backend -PassThru -WindowStyle Hidden

          try {
            $health = $null
            foreach ($attempt in 1..60) {
              try {
                $health = Invoke-RestMethod -Uri "http://127.0.0.1:8128/api/health"
                break
              } catch {
                Start-Sleep -Seconds 2
              }
            }

            if ($null -eq $health) {
              throw "Backend did not become ready."
            }
            if ($health.ok -ne $true) {
              throw "Backend health returned ok=false: $($health.error)"
            }

            $health | ConvertTo-Json -Compress
          } finally {
            if ($process -and -not $process.HasExited) {
              Stop-Process -Id $process.Id -Force
            }
          }

      - name: Verify installer exists
        shell: pwsh
        run: Get-ChildItem -Path "src-tauri\target\release\bundle\nsis\*.exe" | Format-Table -AutoSize

      - name: Upload Windows installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: local-face-photos-windows-x64-installer
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error
          retention-days: 14
